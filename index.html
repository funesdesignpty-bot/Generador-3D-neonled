<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funes Design 360 - Neón Flex PRO PLUS</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #1e1e24; color: #fff; overflow: hidden; }
        #sidebar { width: 380px; background-color: #2a2a35; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; display: flex; flex-direction: column; gap: 15px; height: 100vh; box-sizing: border-box; }
        #viewer-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #3a3a4c 0%, #1a1a26 100%); position: relative; }
        h2 { margin-top: 15px; margin-bottom: 5px; color: #00b4d8; font-size: 13px; border-bottom: 2px solid #00b4d8; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        label { font-size: 12px; color: #ccc; font-weight: bold; }
        select, input[type="range"] { width: 100%; padding: 8px; background: #3a3a4c; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
        input[type="range"] { accent-color: #00b4d8; padding: 0; }
        input[type="file"] { background: #3a3a4c; padding: 12px; border-radius: 5px; border: 2px dashed #00b4d8; color: #fff; cursor: pointer; width: 100%; box-sizing: border-box; }
        .btn-panel { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { background-color: #00b4d8; color: white; border: none; padding: 14px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        button:hover { background-color: #0077b6; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #btn-export { background-color: #2a9d8f; }
        #btn-export:hover { background-color: #264653; }
        #loading { position: absolute; top: 16px; color: #00b4d8; font-weight: bold; font-size: 14px; z-index: 10; background: rgba(0,0,0,0.85); padding: 12px 18px; border-radius: 8px; border: 1px solid #00b4d8; text-align: center; display: none; max-width: 80%; }
        #fixed-upload { background: #22222b; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        #log { background: #14141a; border: 1px solid #333; border-radius: 6px; padding: 8px; font-size: 10px; color: #888; height: 90px; overflow-y: auto; font-family: monospace; margin-top: auto; }
        #viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1 style="font-size: 20px; color: #00b4d8; margin: 0; text-align: center;">Neón Flex PRO PLUS</h1>

        <div id="fixed-upload" class="control-group">
            <label style="color: #00b4d8; font-size: 12px;">1. ARCHIVO VECTORIAL (CUALQUIER SVG)</label>
            <input type="file" id="svg-file" accept=".svg">
        </div>

        <div id="dynamic-params"></div>

        <div class="btn-panel">
            <button id="btn-render">Generar Modelo 3D ⚡</button>
            <button id="btn-export">Descargar archivo STL 📥</button>
        </div>

        <div id="log"></div>
    </div>

    <div id="viewer-container">
        <div id="loading">Preparando entorno...</div>
        <div id="viewer"></div>
    </div>

    <!-- Visor 3D: three.js + cargador de STL + controles de órbita (arrastrar para rotar) -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Nuestra lógica: se carga como "module" porque usa import de openscad.js -->
    <script type="module" src="app.js?v=6"></script>
</body>
</html>
