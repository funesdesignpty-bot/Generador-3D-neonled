<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Neón Flex PRO</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1e1e24; color: #fff; font-family: sans-serif; }
        #sidebar { width: 350px; padding: 20px; overflow-y: auto; border-right: 1px solid #444; }
        #viewer { flex: 1; position: relative; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; color: #00b4d8; text-transform: uppercase; font-size: 11px; }
        input, select { width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #555; }
    </style>
    <script>
        var Module = {
            locateFile: function(path) {
                if (path.endsWith('.wasm')) return 'https://openscad.org/playground/' + path;
                return path;
            }
        };
    </script>
    <script src="https://openscad.org/playground/openscad.js"></script>
</head>
<body>
    <div id="sidebar">
        <h2>Controles</h2>
        <input type="file" id="svg-file" accept=".svg">
        <div id="dynamic-params"></div>
    </div>
    <div id="viewer"></div>
    <script src="app.js"></script>
</body>
</html>
