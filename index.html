<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funes Design 360 - Generador Neón Flex</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #1e1e24; color: #fff; overflow: hidden; }
        #sidebar { width: 380px; background-color: #2a2a35; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; display: flex; flex-direction: column; gap: 15px; height: 100vh; box-sizing: border-box; }
        #viewer-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #3a3a4c 0%, #1a1a26 100%); position: relative; }
        h2 { margin-top: 15px; margin-bottom: 5px; color: #00b4d8; font-size: 13px; border-bottom: 2px solid #00b4d8; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        label { font-size: 12px; color: #ccc; font-weight: bold; }
        select, input[type="range"] { width: 100%; padding: 8px; background: #3a3a4c; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
        input[type="range"] { accent-color: #00b4d8; padding: 0; }
        input[type="file"] { background: #3a3a4c; padding: 12px; border-radius: 5px; border: 2px dashed #00b4d8; color: #fff; cursor: pointer; width: 100%; box-sizing: border-box; }
        .btn-panel { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; padding-bottom: 25px; }
        button { background-color: #00b4d8; color: white; border: none; padding: 14px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        button:hover { background-color: #0077b6; }
        #btn-export { background-color: #2a9d8f; }
        #btn-export:hover { background-color: #264653; }
        #loading { position: absolute; color: #00b4d8; font-weight: bold; font-size: 16px; display: none; z-index: 10; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 8px; border: 1px solid #00b4d8; text-align: center; }
        #fixed-upload { background: #22222b; padding: 15px; border-radius: 8px; border: 1px solid #444; }
    </style>
    <script src="https://openscad.org/playground/openscad.js"></script>
</head>
<body>

    <div id="sidebar">
        <h1 style="font-size: 20px; color: #00b4d8; margin: 0; text-align: center;">Funes Design 360</h1>
        
        <div id="fixed-upload" class="control-group">
            <label style="color: #00b4d8; font-size: 12px;">1. ARCHIVO VECTORIAL (CUALQUIER SVG)</label>
            <input type="file" id="svg-file" accept=".svg">
        </div>

        <div id="params-container">
            <h2>Selección de Pieza y Modo</h2>
            <div class="control-group">
                <label id="lbl-Tipo_de_Proyecto">Tipo de Proyecto: Neon_Flex</label>
                <select id="param-Tipo_de_Proyecto">
                    <option value="Neon_Flex" selected>Neon Flex</option>
                    <option value="Acrilica_Fondo_Hueco">Acrilica Fondo Hueco</option>
                    <option value="Ajuste_Trasero_Muesca">Ajuste Trasero Muesca</option>
                </select>
            </div>
            <div class="control-group">
                <label id="lbl-Exportar_Seccion">Exportar Sección: completa</label>
                <select id="param-Exportar_Seccion">
                    <option value="completa" selected>Completa</option>
                    <option value="cortada">Cortada</option>
                </select>
            </div>
            <div class="control-group">
                <label id="lbl-Activar_Base_Union">Activar Base Unión: no</label>
                <select id="param-Activar_Base_Union">
                    <option value="no" selected>No</option>
                    <option value="si">Si</option>
                </select>
            </div>

            <h2>Dimensiones Canal de Neón</h2>
            <div class="control-group">
                <label id="lbl-Ancho_Canal_Neon">Ancho Canal Neón: 6.0 mm</label>
                <input type="range" id="param-Ancho_Canal_Neon" min="3" max="12" step="0.1" value="6.0">
            </div>
            <div class="control-group">
                <label id="lbl-Profundidad_Canal">Profundidad Canal: 11.0 mm</label>
                <input type="range" id="param-Profundidad_Canal" min="5" max="20" step="0.5" value="11.0">
            </div>
            <div class="control-group">
                <label id="lbl-Pared_Neon">Pared Neón: 2.3 mm</label>
                <input type="range" id="param-Pared_Neon" min="1" max="5" step="0.1" value="2.3">
            </div>
            <div class="control-group">
                <label id="lbl-Fondo_Neon">Fondo Neón: 1.5 mm</label>
                <input type="range" id="param-Fondo_Neon" min="0.5" max="5" step="0.1" value="1.5">
            </div>

            <h2>Dimensiones Base Corpórea</h2>
            <div class="control-group">
                <label id="lbl-Altura_Corporea">Altura Corpórea: 35 mm</label>
                <input type="range" id="param-Altura_Corporea" min="10" max="100" step="1" value="35">
            </div>
            <div class="control-group">
                <label id="lbl-Pared_Externa_Corp">Pared Externa Corpórea: 2.0 mm</label>
                <input type="range" id="param-Pared_Externa_Corp" min="1" max="5" step="0.1" value="2.0">
            </div>
            <div class="control-group">
                <label id="lbl-Soporte_Interno_Corp">Soporte Interno: 2.5 mm</label>
                <input type="range" id="param-Soporte_Interno_Corp" min="1" max="5" step="0.1" value="2.5">
            </div>
            <div class="control-group">
                <label id="lbl-Distancia_Acritico_Tope">Distancia Acrílico Tope: 5.0 mm</label>
                <input type="range" id="param-Distancia_Acritico_Tope" min="1" max="10" step="0.5" value="5.0">
            </div>

            <h2>Estructura y Cama</h2>
            <div class="control-group">
                <label id="lbl-Altura_Base_Union">Altura Base Unión: 2.0 mm</label>
                <input type="range" id="param-Altura_Base_Union" min="1" max="10" step="0.5" value="2.0">
            </div>
            <div class="control-group">
                <label id="lbl-Margen_Base_Union">Margen Base Unión: 0 mm</label>
                <input type="range" id="param-Margen_Base_Union" min="0" max="20" step="1" value="0">
            </div>
            <div class="control-group">
                <label id="lbl-Tamano_Cama">Tamaño de Cama Impresora: 220 mm</label>
                <input type="range" id="param-Tamano_Cama" min="100" max="500" step="10" value="220">
            </div>
        </div>

        <div class="btn-panel">
            <button id="btn-render">Generar Modelo 3D ⚡</button>
            <button id="btn-export">Descargar archivo STL 📥</button>
        </div>
    </div>

    <div id="viewer-container">
        <div id="loading">Iniciando motor matemático 3D...</div>
        <div id="viewer" style="width: 100%; height: 100%;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
